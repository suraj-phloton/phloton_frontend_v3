[server]
headless = true

# ─── Phloton dark theme ──────────────────────────────────────────────────────
# Aligned with app.phloton.com so the two surfaces feel like siblings:
#   navy bg, teal accent, light off-white text, dim navy-grey for secondary.
[theme]
base                     = "dark"
primaryColor             = "#00C9A7"   # teal accent (buttons, links, focus)
backgroundColor          = "#0A1628"   # navy — main pane
secondaryBackgroundColor = "#12203A"   # slightly lighter navy — sidebar + cards
textColor                = "#F0F4F8"   # primary text (warm white)
font                     = "sans serif"
